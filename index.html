<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #e8b94f;
    --accent2: #c47f2a;
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --danger: #e05555;
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans', sans-serif; }

  /* ---- SCREENS ---- */
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; transition: opacity .3s, transform .3s; }
  .screen.hidden { opacity:0; pointer-events:none; transform:translateY(20px); }

  /* ---- LOGIN ---- */
  #loginScreen {
    justify-content:center; align-items:center; padding:32px 24px;
    background: radial-gradient(ellipse at 60% 0%, #1e1530 0%, var(--bg) 60%);
  }
  .logo { text-align:center; margin-bottom:40px; }
  .logo h1 { font-family:'Bebas Neue', cursive; font-size:52px; letter-spacing:4px; color:var(--accent); line-height:1; }
  .logo p { color:var(--muted); font-size:13px; letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 24px; width:100%; max-width:400px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .field input {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
    padding:12px 14px; color:var(--text); font-size:15px; font-family:inherit; outline:none;
    transition: border-color .2s;
  }
  .field input:focus { border-color:var(--accent); }
  .btn-primary {
    width:100%; background:var(--accent); color:#0a0a0f; border:none; border-radius:var(--radius);
    padding:14px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer;
    transition: background .2s, transform .1s; margin-top:8px;
  }
  .btn-primary:active { transform:scale(.98); background:var(--accent2); }
  .error-msg { color:var(--danger); font-size:13px; margin-top:10px; text-align:center; min-height:18px; }

  /* ---- MAIN APP ---- */
  #appScreen { background:var(--bg); }

  /* TOPBAR */
  .topbar {
    display:flex; align-items:center; padding:12px 16px; gap:12px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .topbar .logo-small { font-family:'Bebas Neue'; font-size:24px; color:var(--accent); letter-spacing:2px; }
  .search-wrap { flex:1; position:relative; }
  .search-wrap input {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:50px;
    padding:9px 14px 9px 36px; color:var(--text); font-size:14px; font-family:inherit; outline:none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-wrap .ico-search { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; pointer-events:none; }
  .btn-icon { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; }

  /* CATEGORY TABS */
  .cat-tabs { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
  .cat-tabs::-webkit-scrollbar { display:none; }
  .cat-tab {
    flex-shrink:0; background:var(--surface2); border:1px solid var(--border); border-radius:50px;
    padding:7px 16px; font-size:13px; font-family:inherit; color:var(--muted); cursor:pointer;
    transition: all .2s; white-space:nowrap;
  }
  .cat-tab.active { background:var(--accent); border-color:var(--accent); color:#0a0a0f; font-weight:600; }

  /* CONTENT GRID */
  .content-area { flex:1; overflow-y:auto; padding:4px 12px 80px; scrollbar-width:none; }
  .content-area::-webkit-scrollbar { display:none; }

  /* Favorites row */
  .section-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:12px 4px 8px; }
  .fav-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; }
  .fav-row::-webkit-scrollbar { display:none; }
  .fav-card {
    flex-shrink:0; width:100px; border-radius:8px; overflow:hidden; cursor:pointer;
    border:1px solid var(--border); position:relative; background:var(--surface2);
    transition: transform .2s;
  }
  .fav-card:active { transform:scale(.95); }
  .fav-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
  .fav-card .fav-title { font-size:11px; padding:4px 6px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* VOD Grid */
  .vod-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding-top:4px; }
  @media(min-width:500px){ .vod-grid { grid-template-columns:repeat(4,1fr); } }
  .vod-card {
    border-radius:8px; overflow:hidden; cursor:pointer; position:relative;
    background:var(--surface2); border:1px solid var(--border); transition: transform .2s;
  }
  .vod-card:active { transform:scale(.95); }
  .vod-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:#1c1c27; }
  .vod-card .vod-info { padding:6px 7px 8px; }
  .vod-card .vod-name { font-size:12px; font-weight:500; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .vod-card .vod-rating { font-size:10px; color:var(--accent); margin-top:2px; }
  .fav-badge {
    position:absolute; top:5px; right:5px; background:var(--accent); color:#0a0a0f;
    border-radius:50%; width:18px; height:18px; font-size:10px; display:flex; align-items:center; justify-content:center;
  }

  /* LOAD MORE */
  .load-more-btn {
    display:block; width:100%; margin:16px 0; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:12px; border-radius:var(--radius); font-family:inherit; font-size:14px; cursor:pointer;
    transition: background .2s;
  }
  .load-more-btn:active { background:var(--border); }

  /* SPINNER */
  .spinner-wrap { display:flex; justify-content:center; align-items:center; padding:40px; flex-direction:column; gap:12px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner-wrap p { color:var(--muted); font-size:13px; }

  /* ---- PLAYER SCREEN ---- */
  #playerScreen { background:#000; }
  .player-topbar {
    display:flex; align-items:center; gap:12px; padding:10px 14px;
    background:linear-gradient(to bottom, rgba(0,0,0,.8), transparent);
    position:absolute; top:0; left:0; right:0; z-index:10;
  }
  .btn-back { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:4px; }
  .player-title { font-size:15px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .btn-fav { background:none; border:none; color:var(--accent); font-size:20px; cursor:pointer; }
  video { width:100%; height:100%; object-fit:contain; background:#000; }
  .player-info {
    position:absolute; bottom:0; left:0; right:0; padding:16px;
    background:linear-gradient(to top, rgba(0,0,0,.9), transparent);
    pointer-events:none;
  }
  .player-info h2 { font-family:'Bebas Neue'; font-size:28px; letter-spacing:2px; color:#fff; }
  .player-info p { font-size:12px; color:rgba(255,255,255,.6); margin-top:4px; }

  /* ---- DETAIL SCREEN ---- */
  #detailScreen { overflow-y:auto; }
  .detail-hero { position:relative; width:100%; aspect-ratio:2/3; max-height:360px; overflow:hidden; }
  .detail-hero img { width:100%; height:100%; object-fit:cover; }
  .detail-hero::after { content:''; position:absolute; inset:0; background:linear-gradient(to top, var(--bg) 0%, transparent 50%); }
  .detail-back { position:absolute; top:14px; left:14px; z-index:2; background:rgba(0,0,0,.5); border:none; color:#fff; font-size:22px; cursor:pointer; padding:6px 10px; border-radius:8px; backdrop-filter:blur(8px); }
  .detail-body { padding:0 18px 80px; margin-top:-40px; position:relative; }
  .detail-title { font-family:'Bebas Neue'; font-size:36px; letter-spacing:2px; line-height:1; }
  .detail-meta { display:flex; gap:10px; align-items:center; margin:8px 0 14px; flex-wrap:wrap; }
  .badge { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:3px 8px; font-size:11px; color:var(--muted); }
  .badge.gold { background:rgba(232,185,79,.15); border-color:var(--accent); color:var(--accent); }
  .detail-plot { font-size:14px; color:rgba(240,240,245,.75); line-height:1.6; margin-bottom:20px; }
  .btn-play {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; background:var(--accent); color:#0a0a0f; border:none; border-radius:var(--radius);
    padding:15px; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer;
    transition: background .2s; letter-spacing:.5px;
  }
  .btn-play:active { background:var(--accent2); }
  .btn-fav-detail {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:var(--radius);
    padding:13px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;
    margin-top:10px; transition: all .2s;
  }
  .btn-fav-detail.active { border-color:var(--accent); color:var(--accent); }

  /* BOTTOM NAV */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0; height:60px;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; align-items:center; z-index:20;
  }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:8px 0; }
  .nav-item span:first-child { font-size:20px; }
  .nav-item span:last-child { font-size:10px; color:var(--muted); }
  .nav-item.active span:last-child { color:var(--accent); }
  .nav-item.active span:first-child { filter: drop-shadow(0 0 4px var(--accent)); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .ico { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  /* SETTINGS PANEL */
  #settingsPanel {
    position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.7);
    display:flex; align-items:flex-end; transition: opacity .3s;
  }
  #settingsPanel.hidden { opacity:0; pointer-events:none; }
  .settings-sheet {
    background:var(--surface); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%;
    transform:translateY(0); transition: transform .3s;
  }
  #settingsPanel.hidden .settings-sheet { transform:translateY(100%); }
  .settings-sheet h3 { font-family:'Bebas Neue'; font-size:28px; letter-spacing:2px; margin-bottom:20px; color:var(--accent); }
  .settings-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .settings-row:last-child { border:none; }
  .settings-val { color:var(--muted); font-size:13px; }
  .btn-logout { width:100%; margin-top:16px; background:rgba(224,85,85,.15); border:1px solid var(--danger); color:var(--danger); border-radius:var(--radius); padding:13px; font-family:inherit; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="screen" id="loginScreen">
  <div class="logo">
    <h1>StreamVault</h1>
    <p>Votre médiathèque privée</p>
  </div>
  <div class="login-card">
    <div class="field">
      <label>URL Serveur</label>
      <input type="url" id="loginUrl" placeholder="http://serveur.com:8080" autocomplete="off" autocapitalize="none">
    </div>
    <div class="field">
      <label>Identifiant</label>
      <input type="text" id="loginUser" placeholder="username" autocomplete="off" autocapitalize="none">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="loginBtn">Se connecter</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="screen hidden" id="appScreen">
  <div class="topbar">
    <span class="logo-small">SV</span>
    <div class="search-wrap">
      <span class="ico-search">🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un film, série…">
    </div>
    <button class="btn-icon" id="settingsBtn">⚙️</button>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="content-area" id="contentArea"></div>
  <nav class="bottom-nav">
    <div class="nav-item active" data-tab="vod">
      <span>🎬</span><span>Films</span>
    </div>
    <div class="nav-item" data-tab="series">
      <span>📺</span><span>Séries</span>
    </div>
    <div class="nav-item" data-tab="favs">
      <span>⭐</span><span>Favoris</span>
    </div>
  </nav>
</div>

<!-- ===== DETAIL ===== -->
<div class="screen hidden" id="detailScreen">
  <div class="detail-hero">
    <button class="detail-back" id="detailBack">‹</button>
    <img id="detailPoster" src="" alt="">
  </div>
  <div class="detail-body">
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-plot" id="detailPlot"></div>
    <button class="btn-play" id="detailPlay">▶ Regarder</button>
    <button class="btn-fav-detail" id="detailFavBtn">☆ Ajouter aux favoris</button>
  </div>
</div>

<!-- ===== PLAYER ===== -->
<div class="screen hidden" id="playerScreen">
  <div class="player-topbar">
    <button class="btn-back" id="playerBack">‹</button>
    <span class="player-title" id="playerTitle"></span>
    <button class="btn-fav" id="playerFavBtn">☆</button>
  </div>
  <video id="videoEl" controls playsinline autoplay></video>
  <div class="player-info">
    <h2 id="playerInfoTitle"></h2>
    <p id="playerInfoMeta"></p>
  </div>
</div>

<!-- ===== SETTINGS ===== -->
<div id="settingsPanel" class="hidden">
  <div class="settings-sheet">
    <h3>Paramètres</h3>
    <div class="settings-row">
      <span>Serveur</span>
      <span class="settings-val" id="setServer">—</span>
    </div>
    <div class="settings-row">
      <span>Utilisateur</span>
      <span class="settings-val" id="setUser">—</span>
    </div>
    <div class="settings-row">
      <span>Expiration</span>
      <span class="settings-val" id="setExpiry">—</span>
    </div>
    <div class="settings-row">
      <span>Favoris sauvegardés</span>
      <span class="settings-val" id="setFavCount">0</span>
    </div>
    <button class="btn-logout" id="logoutBtn">Se déconnecter</button>
    <button class="load-more-btn" style="margin-top:10px;" id="closeSettings">Fermer</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// ---- STATE ----
let state = {
  server: '', user: '', pass: '',
  categories: [], allVod: [], displayedVod: [],
  currentCat: 'all', searchQuery: '',
  currentTab: 'vod',
  currentItem: null,
  favorites: JSON.parse(localStorage.getItem('sv_favs') || '[]'),
  page: 0, pageSize: 30,
  seriesCategories: [], allSeries: []
};

// ---- UTILS ----
const PROXY = url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
const api = (path, params='') => `${state.server}/player_api.php?username=${state.user}&password=${state.pass}&${path}${params}`;
const saveFavs = () => localStorage.setItem('sv_favs', JSON.stringify(state.favorites));
const isFav = item => state.favorites.some(f => f.stream_id === item.stream_id || f.series_id === item.series_id);
const toggleFav = item => {
  if(isFav(item)) {
    state.favorites = state.favorites.filter(f => (f.stream_id||f.series_id) !== (item.stream_id||item.series_id));
  } else {
    state.favorites.push(item);
  }
  saveFavs();
};

// ---- LOGIN ----
function tryLoadSaved() {
  const saved = localStorage.getItem('sv_creds');
  if(saved) {
    const c = JSON.parse(saved);
    state.server = c.server; state.user = c.user; state.pass = c.pass;
    return true;
  }
  return false;
}

$('loginBtn').onclick = async () => {
  const url = $('loginUrl').value.trim().replace(/\/+$/,'');
  const user = $('loginUser').value.trim();
  const pass = $('loginPass').value.trim();
  if(!url||!user||!pass){ $('loginError').textContent='Tous les champs sont requis.'; return; }
  $('loginBtn').textContent = 'Connexion…';
  $('loginError').textContent = '';
  state.server = url; state.user = user; state.pass = pass;
  try {
    await loadApp();
    localStorage.setItem('sv_creds', JSON.stringify({server:url, user, pass}));
  } catch(e) {
    $('loginError').textContent = 'Connexion échouée. Vérifiez vos identifiants.';
    $('loginBtn').textContent = 'Se connecter';
  }
};

// ---- LOAD APP ----
async function loadApp() {
  showScreen('appScreen');
  $('setServer').textContent = state.server.replace(/https?:\/\//,'').substring(0,20)+'…';
  $('setUser').textContent = state.user;
  await loadVodCategories();
}

async function loadVodCategories() {
  showLoading('Chargement des catégories…');
  const res = await fetch(api('action=get_vod_categories'));
  const cats = await res.json();
  state.categories = [{category_id:'all', category_name:'Tout'}, ...cats];
  renderCatTabs();
  await loadVodByCategory('all');
}

async function loadVodByCategory(catId) {
  state.currentCat = catId; state.page = 0;
  showLoading('Chargement des films…');
  const param = catId === 'all' ? '' : `&category_id=${catId}`;
  const res = await fetch(api('action=get_vod_streams', param));
  const vods = await res.json();
  state.allVod = vods;
  applyFilter();
}

async function loadSeriesCategories() {
  showLoading('Chargement des séries…');
  try {
    const [catRes, serRes] = await Promise.all([
      fetch(api('action=get_series_categories')),
      fetch(api('action=get_series'))
    ]);
    state.seriesCategories = [{category_id:'all', category_name:'Tout'}, ...await catRes.json()];
    state.allSeries = await serRes.json();
    renderCatTabs(true);
    applyFilter();
  } catch(e) { showEmpty('Impossible de charger les séries.'); }
}

function applyFilter() {
  const q = state.searchQuery.toLowerCase();
  const src = state.currentTab === 'series' ? state.allSeries : state.allVod;
  const nameKey = state.currentTab === 'series' ? 'name' : 'name';
  let filtered = src;
  if(state.currentCat !== 'all') {
    filtered = filtered.filter(v => v.category_id == state.currentCat);
  }
  if(q) filtered = filtered.filter(v => (v.name||'').toLowerCase().includes(q));
  state.displayedVod = filtered;
  state.page = 0;
  renderGrid();
}

// ---- RENDER ----
function renderCatTabs(isSeries=false) {
  const cats = isSeries ? state.seriesCategories : state.categories;
  $('catTabs').innerHTML = cats.map(c => `
    <button class="cat-tab${c.category_id==state.currentCat?' active':''}" data-id="${c.category_id}">
      ${c.category_name}
    </button>
  `).join('');
  $('catTabs').querySelectorAll('.cat-tab').forEach(btn => {
    btn.onclick = () => {
      if(state.currentTab === 'series') {
        state.currentCat = btn.dataset.id;
        renderCatTabs(true);
        applyFilter();
      } else {
        loadVodByCategory(btn.dataset.id);
      }
    };
  });
}

function renderGrid() {
  const area = $('contentArea');
  const items = state.displayedVod;
  const isSeries = state.currentTab === 'series';

  if(!items.length) { showEmpty('Aucun contenu trouvé.'); return; }

  const slice = items.slice(0, (state.page+1) * state.pageSize);
  const favs = state.favorites;

  // Favorites row (top section, only when searching nothing + all cats)
  let favsHtml = '';
  if(favs.length && !state.searchQuery && state.currentCat === 'all') {
    favsHtml = `<div class="section-title">⭐ Mes Favoris</div>
    <div class="fav-row">
      ${favs.slice(0,10).map(f => {
        const cover = f.cover || f.series_cover || '';
        const title = f.name || f.title || 'Sans titre';
        return `<div class="fav-card" data-id="${f.stream_id||f.series_id}" data-type="${f.series_id?'series':'vod'}">
          <img src="${cover}" onerror="this.style.opacity=.3" loading="lazy">
          <div class="fav-title">${title}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  const gridHtml = slice.map(v => {
    const cover = v.stream_icon || v.cover || v.series_cover || '';
    const name = v.name || v.title || 'Sans titre';
    const rating = v.rating ? `⭐ ${parseFloat(v.rating).toFixed(1)}` : '';
    const fav = isFav(v) ? '<div class="fav-badge">★</div>' : '';
    return `<div class="vod-card" data-id="${v.stream_id||v.series_id}" data-type="${v.series_id?'series':'vod'}">
      <img src="${cover}" onerror="this.style.display='none'" loading="lazy">
      ${fav}
      <div class="vod-info">
        <div class="vod-name">${name}</div>
        ${rating ? `<div class="vod-rating">${rating}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const loadMore = slice.length < items.length
    ? `<button class="load-more-btn" id="loadMoreBtn">Charger plus (${items.length - slice.length} restants)</button>` : '';

  area.innerHTML = favsHtml + `<div class="section-title">${isSeries ? '📺 Séries' : '🎬 Films'} <span style="color:var(--muted);font-size:10px">(${items.length})</span></div><div class="vod-grid">${gridHtml}</div>${loadMore}`;

  // Events
  area.querySelectorAll('.vod-card, .fav-card').forEach(card => {
    card.onclick = () => openDetail(card.dataset.id, card.dataset.type);
  });
  const lm = $('loadMoreBtn');
  if(lm) lm.onclick = () => { state.page++; renderGrid(); };
}

function showLoading(msg='Chargement…') {
  $('contentArea').innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><p>${msg}</p></div>`;
}
function showEmpty(msg) {
  $('contentArea').innerHTML = `<div class="empty-state"><div class="ico">🎬</div><p>${msg}</p></div>`;
}

// ---- DETAIL ----
async function openDetail(id, type='vod') {
  showScreen('detailScreen');
  $('detailTitle').textContent = '…';
  $('detailPlot').textContent = '';
  $('detailMeta').innerHTML = '';
  $('detailPoster').src = '';

  try {
    let info;
    if(type === 'series') {
      const res = await fetch(api(`action=get_series_info&series_id=${id}`));
      info = await res.json();
      const s = info.info || {};
      state.currentItem = { ...s, series_id: id, isSeries: true };
      $('detailTitle').textContent = s.name || 'Série';
      $('detailPoster').src = s.cover || '';
      $('detailMeta').innerHTML = [
        s.genre ? `<span class="badge">${s.genre}</span>` : '',
        s.rating ? `<span class="badge gold">⭐ ${parseFloat(s.rating).toFixed(1)}</span>` : '',
        s.releaseDate ? `<span class="badge">${s.releaseDate.substring(0,4)}</span>` : '',
      ].filter(Boolean).join('');
      $('detailPlot').textContent = s.plot || '';
    } else {
      const res = await fetch(api(`action=get_vod_info&vod_id=${id}`));
      info = await res.json();
      const m = info.info || {};
      const s = info.movie_data || {};
      state.currentItem = { ...s, ...m, stream_id: id, isSeries: false };
      $('detailTitle').textContent = m.name || s.name || 'Film';
      $('detailPoster').src = m.cover_big || m.movie_image || s.stream_icon || '';
      $('detailMeta').innerHTML = [
        m.genre ? `<span class="badge">${m.genre}</span>` : '',
        m.rating ? `<span class="badge gold">⭐ ${parseFloat(m.rating).toFixed(1)}</span>` : '',
        m.releasedate ? `<span class="badge">${m.releasedate.substring(0,4)}</span>` : '',
        m.duration ? `<span class="badge">⏱ ${m.duration}</span>` : '',
      ].filter(Boolean).join('');
      $('detailPlot').textContent = m.plot || '';
    }
    updateFavBtn();
  } catch(e) {
    $('detailPlot').textContent = 'Impossible de charger les détails.';
  }
}

function updateFavBtn() {
  const btn = $('detailFavBtn');
  if(isFav(state.currentItem)) {
    btn.textContent = '★ Retirer des favoris'; btn.classList.add('active');
  } else {
    btn.textContent = '☆ Ajouter aux favoris'; btn.classList.remove('active');
  }
}

$('detailFavBtn').onclick = () => { toggleFav(state.currentItem); updateFavBtn(); renderFavsCount(); };

$('detailPlay').onclick = () => {
  const item = state.currentItem;
  if(item.isSeries) {
    // Show episode selection — simplified: play first episode
    alert('Sélection d\'épisodes : fonctionnalité avancée. Utilisez la recherche dans les détails.');
    return;
  }
  const ext = item.container_extension || 'mkv';
  const url = `${state.server}/movie/${state.user}/${state.pass}/${item.stream_id}.${ext}`;
  playStream(url, item.name || item.title || 'Film', item);
};

// ---- PLAYER ----
function playStream(url, title, item) {
  showScreen('playerScreen');
  $('playerTitle').textContent = title;
  $('playerInfoTitle').textContent = title;
  $('playerInfoMeta').textContent = item.genre || '';
  const v = $('videoEl');
  v.src = url;
  v.play().catch(()=>{});
  updatePlayerFavBtn(item);
}

function updatePlayerFavBtn(item) {
  $('playerFavBtn').textContent = isFav(item) ? '★' : '☆';
  $('playerFavBtn').onclick = () => { toggleFav(item); updatePlayerFavBtn(item); };
}

$('playerBack').onclick = () => {
  $('videoEl').pause(); $('videoEl').src = '';
  showScreen('detailScreen');
};

// ---- FAVORITES TAB ----
function renderFavsTab() {
  $('catTabs').innerHTML = '';
  const area = $('contentArea');
  if(!state.favorites.length) { showEmpty('Aucun favori pour l\'instant.'); return; }
  const html = state.favorites.map(f => {
    const cover = f.cover || f.stream_icon || f.series_cover || '';
    const name = f.name || f.title || 'Sans titre';
    const rating = f.rating ? `⭐ ${parseFloat(f.rating).toFixed(1)}` : '';
    const type = f.series_id ? 'series' : 'vod';
    return `<div class="vod-card" data-id="${f.stream_id||f.series_id}" data-type="${type}">
      <img src="${cover}" onerror="this.style.display='none'" loading="lazy">
      <div class="fav-badge">★</div>
      <div class="vod-info">
        <div class="vod-name">${name}</div>
        ${rating ? `<div class="vod-rating">${rating}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  area.innerHTML = `<div class="section-title">⭐ Mes Favoris (${state.favorites.length})</div><div class="vod-grid">${html}</div>`;
  area.querySelectorAll('.vod-card').forEach(card => {
    card.onclick = () => openDetail(card.dataset.id, card.dataset.type);
  });
}

function renderFavsCount() {
  $('setFavCount').textContent = state.favorites.length;
}

// ---- TABS ----
document.querySelectorAll('.nav-item').forEach(item => {
  item.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    state.currentTab = item.dataset.tab;
    state.currentCat = 'all';
    state.searchQuery = '';
    $('searchInput').value = '';
    if(state.currentTab === 'favs') { renderFavsTab(); }
    else if(state.currentTab === 'series') { loadSeriesCategories(); }
    else { renderCatTabs(); applyFilter(); }
  };
});

// ---- SEARCH ----
let searchTimer;
$('searchInput').oninput = e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.searchQuery = e.target.value;
    if(state.currentTab === 'favs') renderFavsTab();
    else applyFilter();
  }, 300);
};

// ---- SCREENS ----
function showScreen(id) {
  ['loginScreen','appScreen','detailScreen','playerScreen'].forEach(s => {
    $(s).classList.toggle('hidden', s !== id);
  });
}

$('detailBack').onclick = () => showScreen('appScreen');

// ---- SETTINGS ----
$('settingsBtn').onclick = () => {
  renderFavsCount();
  $('setExpiry').textContent = '—';
  $('settingsPanel').classList.remove('hidden');
};
$('closeSettings').onclick = () => $('settingsPanel').classList.add('hidden');
$('settingsPanel').onclick = e => { if(e.target === $('settingsPanel')) $('settingsPanel').classList.add('hidden'); };
$('logoutBtn').onclick = () => {
  localStorage.removeItem('sv_creds');
  location.reload();
};

// ---- INIT ----
(async () => {
  if(tryLoadSaved()) {
    try { await loadApp(); } catch(e) { localStorage.removeItem('sv_creds'); }
  }
})();
</script>
</body>
</html>
